name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release_please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@f3969c04a4ec81d7a9aa4010d84ae6a7602f86a7 # v4.1.1
        id: release
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }} # We need to set the PAT so the publish workflow can be triggered

      # release-please builds the GitHub Release body from the release PR notes,
      # not from CHANGELOG.md, so the "Native SDK Changes" block added by the
      # augment-changelog workflow never reaches the published release. Re-sync
      # the release body from the (already augmented) CHANGELOG.md on main.
      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync GitHub Release notes from CHANGELOG.md
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          node .github/scripts/changelog-section.mjs --tag "${TAG_NAME}" > release-notes.md
          gh release edit "${TAG_NAME}" --notes-file release-notes.md
