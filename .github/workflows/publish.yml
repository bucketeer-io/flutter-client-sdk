name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run pub publish in dry-run mode (validate only, no upload)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.24.3"

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK (configures pub.dev OIDC)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: '3.5.3'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter # For Ubuntu machine
          key: ${{ runner.os }}-flutter-install-cache-${{ env.FLUTTER_VERSION }}

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # v2.13.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run }}
        run: flutter pub publish --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: flutter pub publish --force
