name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run pub publish in dry-run mode (validate only, no upload)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.24.3"

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter # For Ubuntu machine
          key: ${{ runner.os }}-flutter-install-cache-${{ env.FLUTTER_VERSION }}

      # Required so `dart pub publish` can use the GitHub OIDC token for auth.
      # `flutter pub publish` does not configure OIDC by itself.
      # See: https://github.com/subosito/flutter-action/issues/330
      - name: Setup Dart SDK (configures pub.dev OIDC)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run }}
        run: flutter pub publish --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: flutter pub publish --force
